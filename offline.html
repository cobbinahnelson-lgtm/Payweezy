<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0c1c33">
  <title>Payweezy — Offline</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#f5f2ea;color:#0d1b2e;font-family:system-ui,-apple-system,Segoe UI,sans-serif}.card{width:min(440px,100%);padding:28px;border:1px solid #e6e1d3;border-radius:22px;background:#fff;box-shadow:0 22px 60px rgba(13,27,46,.12);text-align:center}.mark{width:64px;height:64px;margin:0 auto 18px;border-radius:50%;display:grid;place-items:center;background:#0d1b2e;color:#c9a869;font:700 25px Georgia,serif}h1{margin:0 0 10px;font-size:23px}p{margin:0 0 20px;color:#767a86;line-height:1.55}button{border:0;border-radius:13px;padding:12px 18px;background:#0d1b2e;color:#fff;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">P</div>
    <h1>You are offline</h1>
    <p>The Payweezy app shell is available, but live Firebase balances and new transactions require an internet connection.</p>
    <button onclick="location.reload()">Try again</button>
  </main>
</body>
</html>
